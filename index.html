<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prestamista Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f0f;--s1:#1a1a1a;--s2:#222;--b1:#2a2a2a;--b2:#383838;--tx:#f0f0f0;--t2:#999;--t3:#555;--ac:#c8f060;--ac2:#a8d040;--red:#ff5f5f;--red-bg:#2a1414;--yl:#f0a040;--yl-bg:#2a1d09;--gr:#50d090;--gr-bg:#0a2419;--bl:#60a8f0;--bl-bg:#0a1928;--r:10px;--rs:6px;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:14px;min-height:100vh}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.login-box{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);padding:2.5rem 2rem;width:100%;max-width:380px;text-align:center}
.login-logo{font-size:11px;color:var(--ac);font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.login-title{font-size:22px;font-weight:600;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--t2);margin-bottom:2rem}
.login-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--rs);color:var(--tx);font-size:14px;cursor:pointer;font-family:var(--sans);transition:all .15s}
.login-btn:hover{background:#2a2a2a;border-color:var(--ac)}
.login-btn svg{width:20px;height:20px}
/* PIN */
.pin-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.pin-box{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);padding:2rem;width:100%;max-width:340px;text-align:center}
.pin-title{font-size:16px;font-weight:500;margin-bottom:6px}
.pin-sub{font-size:12px;color:var(--t2);margin-bottom:1.5rem}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:1.5rem}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--b2);border:1px solid var(--b1);transition:all .15s}
.pin-dot.filled{background:var(--ac);border-color:var(--ac)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:220px;margin:0 auto}
.pin-key{padding:14px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--rs);font-size:18px;font-family:var(--mono);cursor:pointer;transition:all .15s}
.pin-key:hover{background:var(--b1);border-color:var(--b2)}
.pin-key:active{transform:scale(.95)}
.pin-err{color:var(--red);font-size:12px;margin-top:.8rem;font-family:var(--mono);min-height:18px}
/* APP SHELL */
.shell{display:flex;min-height:100vh}
.sidebar{width:210px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:1.25rem;border-bottom:1px solid var(--b1)}
.logo-tag{font-size:10px;color:var(--ac);font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.logo-n{font-size:15px;font-weight:600}
.nav{flex:1;padding:.5rem 0}
.ni{display:flex;align-items:center;gap:9px;padding:10px 1.1rem;font-size:13px;color:var(--t2);cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.ni:hover{color:var(--tx);background:var(--s2)}
.ni.on{color:var(--ac);border-left-color:var(--ac);background:rgba(200,240,96,.06)}
.ni svg{width:15px;height:15px;flex-shrink:0}
.sfooter{padding:.9rem 1.1rem;border-top:1px solid var(--b1);font-size:10px;color:var(--t3);font-family:var(--mono)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{padding:1rem 1.75rem;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.page-t{font-size:17px;font-weight:500}
.user-pill{font-size:11px;color:var(--t2);font-family:var(--mono);background:var(--s2);padding:4px 10px;border-radius:20px;border:1px solid var(--b1);cursor:pointer}
.user-pill:hover{border-color:var(--red);color:var(--red)}
.content{flex:1;overflow-y:auto;padding:1.75rem}
.sec{display:none}.sec.on{display:block}
/* Metrics */
.mets{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem}
.met{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:1rem 1.1rem}
.met-l{font-size:10px;color:var(--t3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.met-v{font-size:21px;font-weight:500;font-family:var(--mono)}
.met-s{font-size:11px;color:var(--t2);margin-top:3px}
/* Cards */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:1.1rem 1.25rem;margin-bottom:10px}
/* Badges */
.badge{font-size:10px;padding:3px 8px;border-radius:4px;font-family:var(--mono);white-space:nowrap}
.b-ok{background:var(--gr-bg);color:var(--gr)}
.b-mora{background:var(--red-bg);color:var(--red)}
.b-paid{background:var(--bl-bg);color:var(--bl)}
/* Chips */
.chip{font-size:10px;padding:2px 7px;border-radius:4px;font-family:var(--mono)}
.chi{background:var(--bl-bg);color:var(--bl)}
.cha{background:var(--gr-bg);color:var(--gr)}
.chm{background:var(--red-bg);color:var(--red)}
/* Buttons */
.btn{padding:7px 14px;font-size:12px;border-radius:var(--rs);cursor:pointer;border:1px solid var(--b2);background:var(--s2);color:var(--tx);font-family:var(--sans);transition:all .15s}
.btn:hover{background:#2e2e2e}
.btn-ac{background:var(--ac);color:#0f0f0f;border-color:var(--ac);font-weight:600}
.btn-ac:hover{background:var(--ac2)}
.btn-red{color:var(--red);border-color:var(--red-bg)}.btn-red:hover{background:var(--red-bg)}
.btn-gr{color:var(--gr);border-color:var(--gr-bg)}.btn-gr:hover{background:var(--gr-bg)}
.btn-yl{color:var(--yl);border-color:var(--yl-bg)}.btn-yl:hover{background:var(--yl-bg)}
.btn-sm{padding:4px 10px;font-size:11px}
.acts{display:flex;gap:7px;margin-top:11px;flex-wrap:wrap}
/* Forms */
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px}
.frow1{margin-bottom:11px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;color:var(--t3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em}
.fg input,.fg select,.fg textarea{background:var(--s2);border:1px solid var(--b1);border-radius:var(--rs);color:var(--tx);padding:8px 11px;font-size:13px;font-family:var(--sans);width:100%}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--ac)}
.fg input::placeholder{color:var(--t3)}
select option{background:var(--s2)}
/* Deudor card */
.dcard{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:1.1rem 1.25rem;margin-bottom:9px;transition:border-color .15s}
.dcard:hover{border-color:var(--b2)}
.dh{display:flex;align-items:center;gap:11px;margin-bottom:13px}
.av{width:40px;height:40px;border-radius:50%;background:var(--s2);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--ac);flex-shrink:0;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover}
.kv-g{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.kv-l{font-size:10px;color:var(--t3);font-family:var(--mono);text-transform:uppercase;margin-bottom:2px}
.kv-v{font-size:13px;font-weight:500;font-family:var(--mono)}
/* Movimientos */
.mov-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--b1);font-size:12px}
.mov-row:last-child{border-bottom:none}
/* Misc */
hr{border:none;border-top:1px solid var(--b1);margin:1.1rem 0}
.sec-t{font-size:11px;font-weight:500;color:var(--t2);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.9rem}
.empty{text-align:center;padding:2.5rem;color:var(--t3);font-size:12px;border:1px dashed var(--b1);border-radius:var(--r)}
.ibox{background:var(--s2);border:1px solid var(--b1);border-radius:var(--rs);padding:9px 12px;font-size:11px;color:var(--t2);margin-bottom:11px;font-family:var(--mono)}
.alert-r{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,95,95,.2);border-radius:var(--rs);padding:9px 13px;font-size:12px;margin-bottom:1rem}
.alert-g{background:var(--gr-bg);color:var(--gr);border-radius:var(--rs);padding:9px 13px;font-size:12px;margin-bottom:1rem}
.foto-up{width:68px;height:68px;border-radius:50%;background:var(--s2);border:1px dashed var(--b2);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:border-color .15s}
.foto-up:hover{border-color:var(--ac)}
.foto-up img{width:100%;height:100%;object-fit:cover}
/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.mo.hidden{display:none}
.mo-box{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);padding:1.4rem;width:100%;max-width:430px}
.mo-t{font-size:15px;font-weight:500;margin-bottom:1.1rem}
.mo-acts{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--t3);font-family:var(--mono);font-size:12px;gap:8px}
.spinner{width:16px;height:16px;border:2px solid var(--b2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tag-colab{font-size:10px;padding:2px 7px;background:rgba(200,240,96,.1);color:var(--ac);border-radius:4px;font-family:var(--mono)}
.tag-banco{font-size:10px;padding:2px 7px;background:rgba(96,168,240,.1);color:var(--bl);border-radius:4px;font-family:var(--mono)}
.tag-prima{font-size:10px;padding:2px 7px;background:rgba(240,160,64,.15);color:var(--yl);border-radius:4px;font-family:var(--mono)}
.cuota-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--b1);font-size:12px}
.cuota-row:last-child{border-bottom:none}
.cuota-paid{opacity:.45}
.comprobante-thumb{width:36px;height:36px;border-radius:4px;object-fit:cover;border:1px solid var(--b1);cursor:pointer}
@media(max-width:680px){.sidebar{display:none}.kv-g{grid-template-columns:repeat(2,1fr)}.frow{grid-template-columns:1fr}}
</style>
</head>
<body>
 
<!-- LOGIN -->
<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">Prestamista Pro</div>
    <div class="login-title">David Arango</div>
    <div class="login-sub">Inicia sesión para continuar</div>
    <div id="login-form">
      <div style="margin-bottom:12px">
        <input id="login-email" type="email" placeholder="tu@correo.com" style="width:100%;padding:11px 14px;background:#1a1a1a;border:1px solid #383838;border-radius:6px;color:#f0f0f0;font-size:14px;font-family:'DM Sans',sans-serif">
      </div>
      <button class="login-btn" onclick="loginMagicLink()">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>

</div>
 
<!-- APP -->
<div id="app-screen" class="shell" style="display:none">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-tag">Prestamista Pro</div>
      <div class="logo-n">David Arango</div>

      <div class="page-t" id="page-t">Resumen</div>
      <div class="user-pill" id="user-pill" onclick="cerrarSesion()" title="Cerrar sesión">...</div>

      <div class="loading"><div class="spinner"></div>Cargando...</div>
    </div>
  </div>
</div>

  <div class="mo-box" id="mo-box">
    <div class="mo-t" id="mo-t"></div>
    <div id="mo-body"></div>
    <div class="mo-acts" id="mo-acts"></div>
  </div>
</div>
 
<script>
// ── SUPABASE CONFIG ────────────────────────────────────────
const SUPA_URL = 'https://ecuziesjyivcsooltwyh.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdXppZXNqeWl2Y3Nvb2x0d3loIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzOTkxODUsImV4cCI6MjA5NDk3NTE4NX0.EUOpyfrxeMDeP_JdQhet4WgksVBBIFIVePJV1yXe098';
const ADMIN_EMAIL = 'davidarango89s@gmail.com';
 
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);
 
// ── STATE ──────────────────────────────────────────────────
let S = { user: null, isAdmin: false, colab: null, prestamos: [], tab: 'dash', detId: null };
let fotoB64 = null;
 
// ── UTILS ──────────────────────────────────────────────────
const cop = n => '$' + Math.round(n).toLocaleString('es-CO');
const fdate = s => { if(!s) return '—'; const d = new Date(s.includes('T') ? s : s+'T12:00:00'); return d.toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric'}); };
const today = () => new Date().toISOString().split('T')[0];
const ini = n => (n||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
const slugify = s => s.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'').slice(0,18)+'_'+Date.now();
 
// ── FINANCE ───────────────────────────────────────────────
function getSaldo(p){
  if(p.tipo_credito==='banco'){
    const schedule=p.schedule?JSON.parse(p.schedule):[];
    const last=schedule.filter(c=>c.pagada).pop();
    return last?Math.max(0,last.saldo):parseFloat(p.monto)||0;
  }
  let s = parseFloat(p.monto)||0;
  (p.movs||[]).filter(m=>m.tipo==='abono').forEach(m=>s-=parseFloat(m.monto)||0);
  return Math.max(0,s);
}
function getInteres(p){ return Math.round(getSaldo(p)*((parseFloat(p.tasa)||0)/100)); }
function getInteresTotal(p){ return (p.movs||[]).filter(m=>m.tipo==='interes'||m.tipo==='mora').reduce((a,m)=>a+(parseFloat(m.monto)||0),0); }
function getProxPago(p){
  const pagados = (p.movs||[]).filter(m=>m.tipo==='interes').length;
  const d = new Date((p.fecha||today())+'T12:00:00');
  d.setMonth(d.getMonth()+pagados+1);
  if(p.diapago) d.setDate(Math.min(parseInt(p.diapago)||1,28));
  return d.toISOString().split('T')[0];
}
function getMesesMora(p){
  if(getSaldo(p)===0) return 0;
  const prox = getProxPago(p);
  if(prox >= today()) return 0;
  const d1=new Date(prox+'T12:00:00'), d2=new Date(today()+'T12:00:00');
  return Math.max(1, Math.round((d2-d1)/(864e5*30)));
}
function getMora(p){ return Math.round(getSaldo(p)*((parseFloat(p.tasa_mora)||1.5)/100)*getMesesMora(p)); }
function status(p){ if(getSaldo(p)===0)return'paid'; if(getMesesMora(p)>0)return'mora'; return'ok'; }
function statusBadge(p){
  const s=status(p);
  if(s==='paid') return '<span class="badge b-paid">Pagado</span>';
  if(s==='mora') return `<span class="badge b-mora">Mora · ${getMesesMora(p)}m</span>`;
  return '<span class="badge b-ok">Al día</span>';
}
 
// ── AUTH ──────────────────────────────────────────────────
const NAVS_ADMIN = [
  {id:'dash',  label:'Resumen',        path:'M3 3h7v7H3zm11 0h7v7h-7zM3 14h7v7H3zm11 7v-7h7v7h-7z'},
  {id:'nuevo', label:'Nuevo préstamo', path:'M12 5v14M5 12h14'},
  {id:'lista', label:'Deudores',       path:'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm8 8l2 2 4-4'},
  {id:'cobros',label:'Cobros del mes', path:'M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z'},
  {id:'colabs',label:'Colaboradores',  path:'M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z'},
  {id:'config',label:'Mi perfil',      path:'M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z'},
  {id:'banco', label:'Créditos bancarios', path:'M2 7l10-5 10 5v2H2V7zm0 4h20v10H2V11zm4 2v6h2v-6H6zm5 0v6h2v-6h-2zm5 0v6h2v-6h-2z'},
];
const NAVS_COLAB = [
  {id:'dash',  label:'Mis préstamos',  path:'M3 3h7v7H3zm11 0h7v7h-7zM3 14h7v7H3zm11 7v-7h7v7h-7z'},
  {id:'cobros',label:'Cobros del mes', path:'M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z'},
  {id:'miscom',label:'Mis comisiones', path:'M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z'},
];
const TITLES = {dash:'Resumen',nuevo:'Nuevo préstamo',lista:'Deudores',cobros:'Cobros del mes',colabs:'Colaboradores',config:'Mi perfil',det:'Detalle',miscom:'Mis comisiones'};
 
async function loginMagicLink(){
  const email = document.getElementById("login-email")?.value.trim();
  if(!email){ alert("Ingresa tu correo."); return; }
  const msg = document.getElementById("login-msg");
  msg.textContent = "Enviando...";
  const {error} = await sb.auth.signInWithOtp({ email, options:{ emailRedirectTo: window.location.href } });
  if(error){ msg.style.color="#ff5f5f"; msg.textContent = "Error: "+error.message; }

const INACTIVITY_MS = 10 * 60 * 1000;
let inactivityTimer = null;
function resetInactivityTimer(){ clearTimeout(inactivityTimer); inactivityTimer = setTimeout(lockApp, INACTIVITY_MS); }
function lockApp(){ if(document.getElementById('app-screen').style.display==='none')return; document.getElementById('app-screen').style.display='none'; showPin('verify'); }
['click','keydown','touchstart','mousemove'].forEach(ev=>document.addEventListener(ev,resetInactivityTimer,{passive:true}));
document.addEventListener('visibilitychange',()=>{ if(document.hidden)return; const last=parseInt(localStorage.getItem('prest_last_active')||'0'); if(Date.now()-last>INACTIVITY_MS)lockApp(); });

// ── PIN ───────────────────────────────────────────────────
let pinBuffer = '';
let pinMode = 'create'; // 'create' | 'confirm' | 'verify'
let pinFirst = '';
 
function showPin(mode){
  pinMode = mode; pinBuffer = ''; pinFirst = '';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('pin-screen').style.display = 'flex';
  if(mode==='create'){
    document.getElementById('pin-title').textContent = 'Crear PIN de acceso';
    document.getElementById('pin-sub').textContent = 'Elige un PIN de 4 dígitos para acceso rápido';
  } else {
    document.getElementById('pin-title').textContent = 'Ingresa tu PIN';
    document.getElementById('pin-sub').textContent = 'PIN de 4 dígitos para acceder';
  }
  updateDots();
}
 
function pinKey(d){
  if(pinBuffer.length >= 4) return;
  pinBuffer += d;
  updateDots();
  if(pinBuffer.length === 4) setTimeout(processPin, 200);
}
 
function pinClear(){ pinBuffer = pinBuffer.slice(0,-1); updateDots(); }
 
function updateDots(){
  for(let i=0;i<4;i++){
    document.getElementById('d'+i).classList.toggle('filled', i < pinBuffer.length);
  }
}
 
function processPin(){
  document.getElementById('pin-err').textContent = '';
  if(pinMode === 'create'){
    pinFirst = pinBuffer; pinBuffer = '';
    pinMode = 'confirm';
    document.getElementById('pin-title').textContent = 'Confirma tu PIN';
    document.getElementById('pin-sub').textContent = 'Ingresa el mismo PIN de nuevo';
    updateDots();
  } else if(pinMode === 'confirm'){
    if(pinBuffer === pinFirst){
      localStorage.setItem('prest_pin', btoa(pinBuffer));
      startApp();
    } else {
      document.getElementById('pin-err').textContent = 'Los PINs no coinciden. Intenta de nuevo.';
      pinBuffer = ''; pinFirst = ''; pinMode = 'create';
      document.getElementById('pin-title').textContent = 'Crear PIN de acceso';
      document.getElementById('pin-sub').textContent = 'Elige un PIN de 4 dígitos';
      updateDots();
    }
  } else { // verify
    const saved = atob(localStorage.getItem('prest_pin')||'');
    if(pinBuffer === saved){
      startApp();
    } else {
      document.getElementById('pin-err').textContent = 'PIN incorrecto.';
      pinBuffer = ''; updateDots();
    }
  }
}

function generarAmortizacion(monto, tasaMensual, fechaInicio, cuotaQ, montoPrima, dia1, dia2){
  const tq = (tasaMensual/100)/2;
  const primasMeses = new Set(['06','12']);
  function nextFechas(desde, num){
    const fechas=[];
    const d=new Date(desde+'T12:00:00');
    // primera quincena: dia1 del siguiente mes
    let cur=new Date(d.getFullYear(), d.getMonth()+1, dia1||10);
    for(let i=0;i<num;i++){
      fechas.push(cur.toISOString().split('T')[0]);
      if(cur.getDate()===(dia1||10)) cur=new Date(cur.getFullYear(),cur.getMonth(),dia2||25);
      else cur=new Date(cur.getFullYear(),cur.getMonth()+1,dia1||10);
    }
    return fechas;
  }
  const fechas=nextFechas(fechaInicio,72);
  let saldo=monto;
  const cuotas=[];
  for(let i=0;i<fechas.length&&saldo>0;i++){
    const fecha=fechas[i];
    const mes=fecha.slice(5,7);
    const diaF=parseInt(fecha.slice(8));
    const esPrima=primasMeses.has(mes)&&diaF===(dia1||10);
    const interes=Math.round(saldo*tq);
    let capital=cuotaQ-interes;
    if(capital<0)capital=0;
    if(capital>saldo)capital=saldo;
    saldo-=capital;
    let prima=0;
    if(esPrima&&saldo>0&&montoPrima>0){prima=Math.min(montoPrima,saldo);saldo-=prima;}
    saldo=Math.max(0,saldo);
    cuotas.push({num:i+1,fecha,interes,capital,cuota:interes+capital,prima,saldo,pagada:false,comprobante:null});
  }
  return cuotas;
}

  if(moraExt.length){ html+=`<p class="sec-t" style="margin-top:1.5rem">Moras anteriores</p><div class="card">`; moraExt.forEach(p=>{html+=`<div class="mov-row"><div style="flex:1.4;font-weight:500">${p.nombre}</div><div style="color:var(--red);flex:1;font-size:11px;font-family:var(--mono)">${getMesesMora(p)}m mora</div><div style="min-width:95px;text-align:right;font-weight:500;color:var(--red);font-family:var(--mono)">${cop(getMora(p))}</div><button class="btn btn-sm btn-yl" onclick="doMora('${p.id}')">Mora</button><button class="btn btn-sm btn-ac" onclick="doInteres('${p.id}')">Interés</button></div>`;}); html+='</div>'; }

}

// ── ACCIONES ──────────────────────────────────────────────
function getP(id){ return S.prestamos.find(x=>x.id===id); }
 
function doInteres(id){
  const p=getP(id); if(!p||getSaldo(p)===0){alert('Saldo en cero.');return}
  const interes=getInteres(p);
  showMo('Registrar cobro de interés',`
    <div class="ibox">Saldo: ${cop(getSaldo(p))} · Tasa: ${p.tasa}% · Interés sugerido: <strong style="color:var(--ac)">${cop(interes)}</strong></div>
    <div class="frow1 fg"><label>Fecha</label><input id="m-f" type="date" value="${today()}"></div>
    <div class="frow1 fg"><label>Monto (COP)</label><input id="m-m" type="number" value="${interes}"></div>
    <div class="frow1 fg"><label>Nota</label><input id="m-n" type="text" placeholder="Opcional"></div>
  `,[{label:'Cancelar',action:'closeMo()',cls:'btn'},{label:'Registrar',action:`confInteres('${id}')`,cls:'btn btn-ac'}]);
}
async function confInteres(id){
  const f=document.getElementById('m-f')?.value, m=parseFloat(document.getElementById('m-m')?.value), n=document.getElementById('m-n')?.value||'';
  if(!f||isNaN(m)||m<=0){alert('Datos inválidos.');return}
  closeMo(); loading();
  const movId='M'+Date.now();
  await sb.from('movimientos').insert([{id:movId,prestamo_id:id,tipo:'interes',fecha:f,monto:m,nota:n}]);
  // Calcular comisión
  const p=getP(id);
  if(p?.colaborador_email){
    const {data:colab}=await sb.from('colaboradores').select('*').eq('email',p.colaborador_email).eq('activo',true).single();
    if(colab?.porcentaje){
      const saldoActual=getSaldo(p);
      const montoComision=Math.round(saldoActual*(colab.porcentaje/100));
      await sb.from('comisiones').insert([{id:'C'+Date.now(),movimiento_id:movId,prestamo_id:id,colaborador_email:p.colaborador_email,monto_interes:saldoActual,porcentaje:colab.porcentaje,monto_comision:montoComision,pagada:false}]);
    }
  }
  await loadPrestamos();
  S.tab==='det'?renderDet(id):renderDash();
}
 
function doAbono(id){
  const p=getP(id); if(!p||getSaldo(p)===0){alert('Saldo en cero.');return}
  const saldo=getSaldo(p);
  showMo('Registrar abono a capital',`
    <div class="ibox">Saldo actual: <strong style="color:var(--ac)">${cop(saldo)}</strong></div>
    <div class="frow1 fg"><label>Fecha</label><input id="m-f" type="date" value="${today()}"></div>
    <div class="frow1 fg"><label>Monto del abono (COP)</label><input id="m-m" type="number" placeholder="50000"></div>
    <div class="frow1 fg"><label>Nota</label><input id="m-n" type="text" placeholder="Opcional"></div>
  `,[{label:'Cancelar',action:'closeMo()',cls:'btn'},{label:'Registrar',action:`confAbono('${id}',${saldo})`,cls:'btn btn-ac'}]);
}
async function confAbono(id,saldo){
  const f=document.getElementById('m-f')?.value, m=parseFloat(document.getElementById('m-m')?.value), n=document.getElementById('m-n')?.value||'';
  if(!f||isNaN(m)||m<=0){alert('Datos inválidos.');return}
  if(m>saldo){alert(`No puede superar el saldo de ${cop(saldo)}.`);return}
  closeMo(); loading();
  await sb.from('movimientos').insert([{id:'M'+Date.now(),prestamo_id:id,tipo:'abono',fecha:f,monto:m,nota:n}]);
  await loadPrestamos();
  const np=getP(id); const ns=getSaldo(np); const ni=getInteres(np);
  S.tab==='det'?renderDet(id):renderDash();
  setTimeout(()=>alert(`Abono registrado.\nNuevo saldo: ${cop(ns)}\nNuevo interés mensual: ${cop(ni)}`),200);
}
 
function doMora(id){
  const p=getP(id); const mora=getMora(p), meses=getMesesMora(p);
  if(!mora){alert('Sin mora.');return}
  showMo('Registrar cobro de mora',`
    <div class="ibox">Mora: <strong style="color:var(--red)">${cop(mora)}</strong> · ${meses} mes${meses>1?'es':''} · Tasa mora: ${p.tasa_mora||1.5}%</div>
    <div class="frow1 fg"><label>Fecha</label><input id="m-f" type="date" value="${today()}"></div>
    <div class="frow1 fg"><label>Monto (COP)</label><input id="m-m" type="number" value="${mora}"></div>
    <div class="frow1 fg"><label>Nota</label><input id="m-n" type="text" value="${meses} mes${meses>1?'es':''} de mora"></div>
  `,[{label:'Cancelar',action:'closeMo()',cls:'btn'},{label:'Registrar',action:`confMora('${id}')`,cls:'btn btn-yl'}]);
}
async function confMora(id){
  const f=document.getElementById('m-f')?.value, m=parseFloat(document.getElementById('m-m')?.value), n=document.getElementById('m-n')?.value||'';
  if(!f||isNaN(m)||m<=0){alert('Datos inválidos.');return}
  closeMo(); loading();
  await sb.from('movimientos').insert([{id:'M'+Date.now(),prestamo_id:id,tipo:'mora',fecha:f,monto:m,nota:n}]);
  await loadPrestamos();
  S.tab==='det'?renderDet(id):renderDash();

async function delMov(movId,prestamoId){
  if(!confirm('¿Eliminar este movimiento?'))return;
  loading();
  await sb.from('movimientos').delete().eq('id',movId);
  await loadPrestamos();
  renderDet(prestamoId);

async function eliminarP(id){
  if(!confirm('¿Eliminar este préstamo y todos sus movimientos?'))return;
  loading();
  await sb.from('prestamos').delete().eq('id',id);
  await loadPrestamos();
  nav('lista');
}
 
 
// ── CRÉDITOS BANCARIOS ───────────────────────────────────
function renderBanco(){
  const bancos=S.prestamos.filter(p=>p.tipo_credito==='banco');
  if(!bancos.length){setContent('<div class="empty">Sin créditos bancarios registrados.<br>Crea uno nuevo desde <strong>Nuevo préstamo</strong> seleccionando tipo "Bancario".</div>');return;}
  setContent(bancos.map(p=>bancoCard(p)).join(''));
}
 
function bancoCard(p){
  const schedule=p.schedule?JSON.parse(p.schedule):[];
  const pagadas=schedule.filter(c=>c.pagada).length;
  const pendientes=schedule.filter(c=>!c.pagada);
  const proxima=pendientes[0];
  const saldo=getSaldo(p);
  const totalCuotas=schedule.length;
  const pct=totalCuotas?Math.round(pagadas/totalCuotas*100):0;
  return`<div class="dcard">
    <div class="dh">
      <div class="av">${p.foto?`<img src="${p.foto}" alt="">`:ini(p.nombre)}</div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:500">${p.nombre} <span class="tag-banco">Bancario</span></div>
        <div style="font-size:11px;color:var(--t2);margin-top:2px;font-family:var(--mono)">${p.telefono||''} · #${p.num_pagare||'—'}</div>
      </div>
      ${statusBadge(p)}
    </div>
    <div class="kv-g" style="margin-bottom:10px">
      <div><div class="kv-l">Capital inicial</div><div class="kv-v">${cop(p.monto)}</div></div>
      <div><div class="kv-l">Saldo actual</div><div class="kv-v" style="color:var(--ac)">${cop(saldo)}</div></div>
      <div><div class="kv-l">Cuota quincenal</div><div class="kv-v">${cop(p.cuota_quincenal||0)}</div></div>
      <div><div class="kv-l">Cuotas pagadas</div><div class="kv-v">${pagadas}/${totalCuotas}</div></div>
      <div><div class="kv-l">Abono prima</div><div class="kv-v" style="color:var(--yl)">${cop(p.monto_prima||0)}</div></div>
      <div><div class="kv-l">Próxima cuota</div><div class="kv-v" style="font-size:11px">${proxima?fdate(proxima.fecha):'—'}</div></div>
    </div>
    <div style="background:var(--s2);border-radius:4px;height:4px;margin-bottom:6px">
      <div style="background:var(--ac);height:4px;border-radius:4px;width:${pct}%"></div>
    </div>
    <div style="font-size:10px;color:var(--t3);font-family:var(--mono);margin-bottom:8px">${pct}% completado</div>
    <div class="acts">
      <button class="btn btn-sm btn-gr" onclick="verSchedule('${p.id}')">Ver tabla de cuotas</button>
      ${proxima&&!proxima.pagada?`<button class="btn btn-sm btn-ac" onclick="pagarCuotaBanco('${p.id}',${proxima.num-1})">Pagar cuota #${proxima.num}</button>`:''}
    </div>
  </div>`;
}
 
function verSchedule(id){
  const p=getP(id); if(!p)return;
  const schedule=p.schedule?JSON.parse(p.schedule):[];
  const rows=schedule.map((c,i)=>{
    const esPrima=c.prima>0;
    return`<div class="cuota-row ${c.pagada?'cuota-paid':''}">
      <span style="min-width:24px;color:var(--t3);font-family:var(--mono);font-size:11px">#${c.num}</span>
      <span style="flex:1;font-size:11px;color:var(--t2)">${fdate(c.fecha)}</span>
      <span style="font-family:var(--mono);font-size:11px">${cop(c.cuota)}</span>
      ${esPrima?`<span class="tag-prima">Prima +${cop(c.prima)}</span>`:''}
      ${c.comprobante?`<img src="${c.comprobante}" class="comprobante-thumb" onclick="verComprobante('${id}',${i})" alt="comp">`:''}
      ${c.pagada?'<span class="badge b-ok" style="font-size:9px">✓</span>':`<button class="btn btn-sm btn-ac" style="font-size:10px;padding:3px 8px" onclick="pagarCuotaBanco('${id}',${i})">Pagar</button>`}
    </div>`;
  }).join('');
  const totalPend=schedule.filter(c=>!c.pagada).reduce((s,c)=>s+c.cuota+c.prima,0);
  showMo(`Tabla de cuotas — ${p.nombre}`,`
    <div class="ibox">Pendiente total: <strong style="color:var(--ac)">${cop(totalPend)}</strong></div>
    <div style="max-height:320px;overflow-y:auto">${rows}</div>
  `,[{label:'Cerrar',action:'closeMo()',cls:'btn'}]);
}
 
function pagarCuotaBanco(id, idx){
  const p=getP(id); if(!p)return;
  const schedule=JSON.parse(p.schedule||'[]');
  const c=schedule[idx]; if(!c||c.pagada)return;
  const esPrima=c.prima>0;
  showMo(`Pagar cuota #${c.num}`,`
    <div class="ibox">
      Fecha: ${fdate(c.fecha)}<br>
      Cuota: <strong style="color:var(--ac)">${cop(c.cuota)}</strong>
      ${esPrima?`· Prima: <strong style="color:var(--yl)">${cop(c.prima)}</strong>`:''}
      · Total: <strong>${cop(c.cuota+(c.prima||0))}</strong>
    </div>
    <div class="frow1 fg"><label>Fecha de pago</label><input id="m-f" type="date" value="${today()}"></div>
    <div class="frow1 fg"><label>Comprobante (foto/imagen)</label>
      <input type="file" id="comp-file" accept="image/*" onchange="previewComp(this)" style="background:var(--s2);border:1px solid var(--b1);border-radius:var(--rs);color:var(--tx);padding:6px">
    </div>
    <div id="comp-preview" style="margin-top:8px"></div>
    <div class="frow1 fg"><label>Nota</label><input id="m-n" type="text" placeholder="Opcional"></div>
  `,[{label:'Cancelar',action:'closeMo()',cls:'btn'},{label:'Confirmar pago',action:`confPagoCuota('${id}',${idx})`,cls:'btn btn-ac'}]);
}
 
let comprobanteB64=null;
function previewComp(input){
  const f=input.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    comprobanteB64=e.target.result;
    document.getElementById('comp-preview').innerHTML=`<img src="${comprobanteB64}" style="max-width:100%;max-height:120px;border-radius:var(--rs);border:1px solid var(--b1)">`;
  };
  r.readAsDataURL(f);
}
 
function verComprobante(id,idx){
  const p=getP(id); if(!p)return;
  const schedule=JSON.parse(p.schedule||'[]');
  const c=schedule[idx]; if(!c?.comprobante)return;
  showMo('Comprobante',`<img src="${c.comprobante}" style="width:100%;border-radius:var(--rs)">`,
    [{label:'Cerrar',action:'closeMo()',cls:'btn'}]);
}
 
async function confPagoCuota(id,idx){
  const fecha=document.getElementById('m-f')?.value;
  const nota=document.getElementById('m-n')?.value||'';
  if(!fecha){alert('Ingresa la fecha.');return}
  const p=getP(id);
  const schedule=JSON.parse(p.schedule||'[]');
  schedule[idx].pagada=true;
  schedule[idx].fechaPago=fecha;
  schedule[idx].nota=nota;
  if(comprobanteB64) schedule[idx].comprobante=comprobanteB64;
  comprobanteB64=null;
  // Registrar como movimiento normal también
  const c=schedule[idx];
  closeMo(); loading();
  await sb.from('movimientos').insert([{id:'M'+Date.now(),prestamo_id:id,tipo:'cuota_banco',fecha,monto:c.cuota+(c.prima||0),nota:nota||`Cuota #${c.num}${c.prima>0?' + Prima':''}`}]);
  await sb.from('prestamos').update({schedule:JSON.stringify(schedule)}).eq('id',id);
  await loadPrestamos();
  renderBanco();
  setTimeout(()=>verSchedule(id),300);
}
 
// ── EDITAR PRÉSTAMO ───────────────────────────────────────
function editarPrestamo(id){
  const p=getP(id);if(!p)return;
  showMo('Editar préstamo',`
    <div class="frow">
      <div class="fg"><label>Nombre</label><input id="e-nom" type="text" value="${p.nombre||''}"></div>
      <div class="fg"><label>Cédula</label><input id="e-cc" type="text" value="${p.cc||''}"></div>
    </div>
    <div class="frow">
      <div class="fg"><label>Teléfono</label><input id="e-tel" type="text" value="${p.telefono||''}"></div>
      <div class="fg"><label>Dirección</label><input id="e-dir" type="text" value="${p.direccion||''}"></div>
    </div>
    <div class="frow">
      <div class="fg"><label>Tasa interés (%)</label><input id="e-tasa" type="number" value="${p.tasa||''}" step="0.5"></div>
      <div class="fg"><label>% mora mensual</label><input id="e-mora" type="number" value="${p.tasa_mora||1.5}" step="0.5"></div>
    </div>
    <div class="frow">
      <div class="fg"><label>Día de pago</label><input id="e-dia" type="number" value="${p.diapago||''}" min="1" max="31"></div>
      <div class="fg"><label>Núm. pagaré</label><input id="e-numpag" type="text" value="${p.num_pagare||''}"></div>
    </div>
    ${S.isAdmin?`<div class="frow1 fg"><label>Email colaborador</label><input id="e-colab" type="email" value="${p.colaborador_email||''}"></div>`:''}
  `,[{label:'Cancelar',action:'closeMo()',cls:'btn'},{label:'Guardar cambios',action:`confEditarPrestamo('${id}')`,cls:'btn btn-ac'}]);
}
async function confEditarPrestamo(id){
  const updates={
    nombre:document.getElementById('e-nom')?.value.trim(),
    cc:document.getElementById('e-cc')?.value.trim(),
    telefono:document.getElementById('e-tel')?.value.trim(),
    direccion:document.getElementById('e-dir')?.value.trim(),
    tasa:parseFloat(document.getElementById('e-tasa')?.value)||undefined,
    tasa_mora:parseFloat(document.getElementById('e-mora')?.value)||1.5,
    diapago:parseInt(document.getElementById('e-dia')?.value)||null,
    num_pagare:document.getElementById('e-numpag')?.value.trim(),
  };
  const colabEl=document.getElementById('e-colab');
  if(colabEl) updates.colaborador_email=colabEl.value.trim();
  Object.keys(updates).forEach(k=>{ if(updates[k]===undefined||updates[k]==='')delete updates[k]; });
  closeMo(); loading();
  await sb.from('prestamos').update(updates).eq('id',id);
  await loadPrestamos();
  renderDet(id);
}
 
// ── EDITAR COLABORADOR ────────────────────────────────────
function editarColab(email,nombre,porcentaje){
  showMo('Editar colaborador',`
    <div class="frow1 fg"><label>Nombre</label><input id="ec-nom" type="text" value="${nombre||''}"></div>
    <div class="frow1 fg"><label>% comisión sobre capital vigente</label><input id="ec-pct" type="number" value="${porcentaje||''}" step="0.5" min="0" max="100"></div>
    <div class="ibox">La comisión se calcula cada mes sobre el saldo vigente del préstamo.</div>
  `,[{label:'Cancelar',action:'closeMo()',cls:'btn'},{label:'Guardar',action:`confEditarColab('${email}')`,cls:'btn btn-ac'}]);
}
async function confEditarColab(email){
  const nom=document.getElementById('ec-nom')?.value.trim();
  const pct=parseFloat(document.getElementById('ec-pct')?.value);
  if(!nom||isNaN(pct)){alert('Completa los campos.');return}
  closeMo(); loading();
  await sb.from('colaboradores').update({nombre:nom,porcentaje:pct}).eq('email',email);
  renderColabs();
}
 
// ── MODAL ─────────────────────────────────────────────────
function showMo(t,body,acts=[]){
  document.getElementById('mo-t').textContent=t;
  document.getElementById('mo-body').innerHTML=body;
  document.getElementById('mo-acts').innerHTML=acts.map(a=>`<button class="${a.cls}" onclick="${a.action}">${a.label}</button>`).join('');
  document.getElementById('modal').classList.remove('hidden');
}
function closeMo(e){ if(e&&e.target!==document.getElementById('modal'))return; document.getElementById('modal').classList.add('hidden'); }
 
// ── INIT ──────────────────────────────────────────────────
async function init(){
  // Hide all screens first
  document.getElementById('login-screen').style.display='none';
  document.getElementById('pin-screen').style.display='none';
  document.getElementById('app-screen').style.display='none';
 
  const {data:{session}, error} = await sb.auth.getSession();
  if(error || !session){
    document.getElementById('login-screen').style.display='flex';
    return;
  }
  S.user = session.user;
  S.isAdmin = session.user.email === ADMIN_EMAIL;
  if(!S.isAdmin){
    const {data:colab}=await sb.from('colaboradores').select('*').eq('email',session.user.email).eq('activo',true).single();
    if(!colab){
      await sb.auth.signOut();
      document.getElementById('login-screen').style.display='flex';
      document.querySelector('.login-sub').textContent='Cuenta no autorizada. Contacta al administrador.';
      return;
    }
    S.colab=colab;
  }
  const savedPin = localStorage.getItem('prest_pin');
  if(!savedPin){ showPin('create'); }
  else { showPin('verify'); }
}
 
sb.auth.onAuthStateChange(async (event, session) => {
  if(event==='SIGNED_IN' && session && document.getElementById('login-screen').style.display!=='none'){
    S.user = session.user;
    S.isAdmin = session.user.email === ADMIN_EMAIL;
    if(!S.isAdmin){
      const {data:colab}=await sb.from('colaboradores').select('*').eq('email',session.user.email).eq('activo',true).single();
      if(!colab){ await sb.auth.signOut(); document.querySelector('.login-sub').textContent='Cuenta no autorizada.'; return; }
      S.colab=colab;
    }
    const savedPin = localStorage.getItem('prest_pin');
    if(!savedPin){ showPin('create'); } else { showPin('verify'); }
  }
});
 
init();
</script>
</body>
</html>
